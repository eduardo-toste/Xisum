services:
  xisum-db:
    image: postgres:16
    container_name: xisum-db
    environment:
      POSTGRES_DB: ${XISUM_DB}
      POSTGRES_USER: ${XISUM_DB_USER}
      POSTGRES_PASSWORD: ${XISUM_DB_PASSWORD}
    ports:
      - "${XISUM_DB_PORT}:5432"
    volumes:
      - xisum-db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${XISUM_DB_USER} -d ${XISUM_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  xisum-db_data:
